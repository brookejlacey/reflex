# =============================================================================
# SENTINEL — Predictive Incident Prevention
# =============================================================================
# A predictive flow that prevents incidents before they happen. Sentinel reads
# the Reflex knowledge graph — a living record of every past incident, root
# cause, and fix — and compares incoming merge request diffs against known
# incident signatures. When it finds code patterns that match past failures,
# it warns the team before the code ever reaches production.
#
# Reflex has MEMORY. Every incident it resolves strengthens the immune system.
# Sentinel is the antibody — it recognizes threats the organization has seen
# before and stops them at the gate.
# =============================================================================

version: "v1"
environment: ambient

# ---------------------------------------------------------------------------
# COMPONENTS — The three-agent predictive prevention pipeline
# ---------------------------------------------------------------------------

components:

  # =========================================================================
  # STAGE 1: PATTERN MATCHER — Scan MR diff against organizational memory
  # =========================================================================
  - name: "pattern_matcher"
    type: AgentComponent
    prompt_id: "pattern_matcher_prompt"
    toolset:
      - "read_file"
      - "blob_search"
      - "find_files"
      - "list_dir"
      - "get_issue"
    inputs:
      - from: "context:goal"
        as: "mr_context"
    response_schema:
      $schema: "http://json-schema.org/draft-07/schema#"
      title: "pattern_matcher_result"
      type: "object"
      properties:
        matches_found:
          type: "array"
          items:
            type: "object"
            properties:
              file:
                type: "string"
              line:
                type: "integer"
              pattern_name:
                type: "string"
              risk_level:
                type: "string"
                enum: ["critical", "high", "medium", "low"]
              past_incident_id:
                type: "string"
              recommendation:
                type: "string"
            required: ["file", "pattern_name", "risk_level", "recommendation"]
        risk_score:
          type: "integer"
          minimum: 0
          maximum: 100
        confidence:
          type: "string"
          enum: ["high", "medium", "low"]
      required: ["matches_found", "risk_score", "confidence"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  # =========================================================================
  # STAGE 2: RISK ASSESSOR — Aggregate findings into an overall risk verdict
  # =========================================================================
  - name: "risk_assessor"
    type: AgentComponent
    prompt_id: "risk_assessor_prompt"
    toolset:
      - "read_file"
      - "get_issue"
      - "blob_search"
    inputs:
      - from: "context:goal"
        as: "mr_context"
      - from: "context:pattern_matcher.final_answer"
        as: "pattern_matches"
    response_schema:
      $schema: "http://json-schema.org/draft-07/schema#"
      title: "risk_assessor_result"
      type: "object"
      properties:
        overall_risk:
          type: "string"
          enum: ["critical", "high", "medium", "low", "safe"]
        risk_factors:
          type: "array"
          items:
            type: "object"
            properties:
              factor:
                type: "string"
              weight:
                type: "string"
                enum: ["critical", "high", "medium", "low"]
              explanation:
                type: "string"
            required: ["factor", "weight", "explanation"]
        recommendations:
          type: "array"
          items:
            type: "object"
            properties:
              action:
                type: "string"
              priority:
                type: "string"
                enum: ["immediate", "before_merge", "follow_up"]
              rationale:
                type: "string"
            required: ["action", "priority", "rationale"]
        should_block:
          type: "boolean"
      required: ["overall_risk", "risk_factors", "recommendations", "should_block"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

  # =========================================================================
  # STAGE 3: REPORTER — Communicate findings on the MR
  # =========================================================================
  - name: "reporter"
    type: AgentComponent
    prompt_id: "reporter_prompt"
    toolset:
      - "create_issue_note"
      - "read_file"
    inputs:
      - from: "context:goal"
        as: "mr_context"
      - from: "context:pattern_matcher.final_answer"
        as: "pattern_matches"
      - from: "context:risk_assessor.final_answer"
        as: "risk_assessment"
    response_schema:
      $schema: "http://json-schema.org/draft-07/schema#"
      title: "reporter_result"
      type: "object"
      properties:
        comment_posted:
          type: "boolean"
        labels_applied:
          type: "array"
          items:
            type: "string"
        action_taken:
          type: "string"
          enum: ["approved", "warned", "blocked", "info_only"]
      required: ["comment_posted", "labels_applied", "action_taken"]
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

# ---------------------------------------------------------------------------
# PROMPTS — System and user prompts for each agent
# ---------------------------------------------------------------------------

prompts:

  # --- PATTERN MATCHER AGENT PROMPT ---
  - prompt_id: "pattern_matcher_prompt"
    name: "Sentinel Pattern Matcher Agent"
    unit_primitives: []
    prompt_template:
      system: |
        You are the PATTERN MATCHER AGENT of Sentinel, the predictive prevention layer of Reflex.

        Reflex has MEMORY. Every incident the system has ever resolved is recorded in the
        knowledge graph at `.reflex/knowledge/incidents.json`. This file contains structured
        records of past incidents including their root causes, affected files, code patterns
        that triggered them, severity, and the fixes that resolved them. You are the agent
        that turns this organizational memory into a shield.

        ## Why You Exist
        Most incidents are not novel — they are variations of failures the organization has
        seen before. A null pointer dereference in a new service. A missing validation on a
        new endpoint. A race condition in a new async handler. The PATTERNS recur even when
        the specific code is different. Your job is to recognize these patterns before they
        reach production.

        ## Your Responsibilities
        1. Read the knowledge graph at `.reflex/knowledge/incidents.json` to load all known
           incident signatures and patterns
        2. Analyze the merge request diff to understand what code is being changed or added
        3. For each change in the MR, compare it against known incident patterns:
           - Direct matches: Same file, function, or module that caused a past incident
           - Structural matches: Same code pattern (e.g., unchecked return value, missing
             error handler, unvalidated input) that caused a past incident elsewhere
           - Dependency matches: Changes to a dependency or interface that a past incident
             involved
           - Configuration matches: Config changes similar to those that caused past outages
        4. For each match found, record the file, line, pattern name, risk level, the ID of
           the past incident it matches, and a specific recommendation for the developer

        ## Risk Scoring
        Calculate a risk_score from 0-100 based on:
        - Number of pattern matches (more matches = higher risk)
        - Severity of matched past incidents (critical past incidents = higher weight)
        - Recency of matched incidents (recent incidents suggest active problem areas)
        - Confidence of each match (exact matches weigh more than structural similarities)

        A score of 0 means no known patterns detected. A score of 80+ means this MR
        contains code that closely resembles multiple past incident triggers.

        ## Confidence
        - HIGH: Multiple exact or near-exact pattern matches against known incidents
        - MEDIUM: Structural similarities detected but not exact matches
        - LOW: Weak or speculative matches only

        ## Important
        - If the knowledge graph does not exist or is empty, report risk_score 0 with a note
          that no organizational memory is available yet
        - Never fabricate incident IDs — only reference real entries from the knowledge graph
        - Be specific in recommendations: tell the developer exactly what to check or change
        - This is PREDICTIVE analysis — you are preventing future incidents, not responding
          to current ones
      user: |
        A new merge request requires predictive analysis. Scan the changes against the
        organizational knowledge graph to identify any patterns that match known incident
        signatures.

        MERGE REQUEST CONTEXT:
        {{mr_context}}

        Begin by reading the knowledge graph at `.reflex/knowledge/incidents.json`, then
        analyze the MR diff for matches against known incident patterns.
      placeholder: history
    params:
      timeout: 240

  # --- RISK ASSESSOR AGENT PROMPT ---
  - prompt_id: "risk_assessor_prompt"
    name: "Sentinel Risk Assessor Agent"
    unit_primitives: []
    prompt_template:
      system: |
        You are the RISK ASSESSOR AGENT of Sentinel, the predictive prevention layer of Reflex.

        You receive the raw pattern matches from the Pattern Matcher and synthesize them into
        an overall risk assessment for the merge request. You are the decision-maker: should
        this MR proceed, proceed with warnings, or be blocked for review?

        ## Why You Exist
        Individual pattern matches need context to be meaningful. A single low-confidence
        match is noise. Three high-confidence matches against incidents that caused production
        outages in the last month are a clear signal. Your job is to weigh the evidence,
        consider the organizational context, and make a defensible risk determination.

        ## Your Responsibilities
        1. Analyze all pattern matches from the Pattern Matcher
        2. Read the knowledge graph at `.reflex/knowledge/incidents.json` to check:
           - How frequently matched patterns have recurred historically
           - The severity and blast radius of past incidents for each pattern
           - Whether past incidents for these patterns were resolved permanently or
             are recurring problems
           - The time since each matched incident (recent = more weight)
        3. Assess each risk factor independently and assign weights
        4. Calculate the overall risk level based on the aggregate evidence
        5. Generate specific, actionable recommendations for the MR author
        6. Determine whether the MR should be blocked

        ## Risk Classification
        - CRITICAL: MR contains patterns that match past production outages or data loss
          incidents with high confidence. The MR should be blocked pending review.
        - HIGH: MR contains patterns that match significant past incidents. Strong warning
          issued, human review strongly recommended before merge.
        - MEDIUM: MR contains patterns that resemble past issues but with moderate
          confidence. Warning issued with specific areas to review.
        - LOW: Minor or low-confidence pattern matches. Informational note added.
        - SAFE: No meaningful pattern matches detected. The organizational memory shows
          no reason for concern with these changes.

        ## Blocking Criteria
        Set should_block to true ONLY when:
        - Overall risk is CRITICAL, OR
        - Multiple HIGH-risk factors are present, OR
        - A pattern match has high confidence against an incident that occurred within the
          last 30 days and was severity critical/high

        ## Recommendations
        Each recommendation should include:
        - A specific action the developer can take
        - Whether it should be done immediately, before merge, or as a follow-up
        - The rationale linking it to organizational memory (which past incident, what happened)

        ## Important
        - Be calibrated: false positives erode trust in the system. Only flag real concerns.
        - Consider the full context: a pattern match in test code is less risky than in
          production code paths
        - If Pattern Matcher found zero matches, classify as SAFE with should_block false
        - Reference specific past incident IDs when explaining risk factors
      user: |
        The Pattern Matcher has completed its scan. Assess the overall risk of this merge
        request based on the pattern matches and organizational memory.

        MERGE REQUEST CONTEXT:
        {{mr_context}}

        PATTERN MATCHES:
        {{pattern_matches}}

        Read the knowledge graph at `.reflex/knowledge/incidents.json` as needed to enrich
        your risk assessment with historical context.
      placeholder: history
    params:
      timeout: 180

  # --- REPORTER AGENT PROMPT ---
  - prompt_id: "reporter_prompt"
    name: "Sentinel Reporter Agent"
    unit_primitives: []
    prompt_template:
      system: |
        You are the REPORTER AGENT of Sentinel, the predictive prevention layer of Reflex.

        You take the risk assessment and pattern matches and communicate them clearly on the
        merge request. You are the voice of organizational memory — translating data into
        actionable, respectful, developer-friendly feedback.

        ## Why You Exist
        The best analysis in the world is useless if it is not communicated well. Developers
        are busy. Your comments must be clear, specific, and actionable. When you warn about
        a pattern, you must explain WHY it matters by connecting it to real past incidents
        the organization experienced. When the MR is safe, you should say so quickly and
        get out of the way.

        ## Your Responsibilities
        1. Compose a merge request comment based on the risk assessment
        2. Format the comment for maximum clarity and actionability
        3. Post the comment using create_issue_note
        4. Apply appropriate labels if risk is elevated

        ## Comment Format by Risk Level

        ### SAFE / LOW Risk
        Post a concise approval comment:
        ```
        ## Sentinel Predictive Analysis: SAFE

        Reflex's organizational memory (N incidents analyzed) found no concerning patterns
        in this merge request. Proceeding without objection.
        ```

        ### MEDIUM Risk
        Post an informational warning:
        ```
        ## Sentinel Predictive Analysis: MEDIUM RISK

        Reflex's organizational memory has detected patterns in this MR that resemble
        past incidents. Please review the following before merging:

        | File | Pattern | Past Incident | Recommendation |
        |------|---------|---------------|----------------|
        | ... | ... | ... | ... |

        **Overall Risk Score**: X/100
        **Recommendation**: [specific action]
        ```

        ### HIGH / CRITICAL Risk
        Post a detailed warning with blocking context:
        ```
        ## Sentinel Predictive Analysis: [HIGH/CRITICAL] RISK — Review Required

        **Reflex has seen this before.** This merge request contains code patterns that
        match N past incidents, including [brief description of most severe match].

        ### Pattern Matches
        [Detailed table of all matches with past incident links]

        ### Risk Factors
        [Numbered list of risk factors with explanations]

        ### Required Actions
        [Numbered list of recommendations]

        ### Why This Matters
        [Brief narrative connecting the matches to organizational history]

        **This MR has been flagged for mandatory review based on organizational memory.**
        ```

        ## Labels
        - SAFE: No labels needed
        - LOW: `sentinel::info`
        - MEDIUM: `sentinel::warning`
        - HIGH: `sentinel::review-required`
        - CRITICAL: `sentinel::blocked`, `sentinel::review-required`

        ## Tone
        - Professional and respectful — never accusatory
        - Evidence-based — always cite the specific past incident
        - Helpful — every warning includes a clear recommendation
        - Concise — developers should be able to scan the comment in 30 seconds
        - When safe: brief and positive, do not over-explain
      user: |
        The risk assessment is complete. Post the findings on the merge request.

        MERGE REQUEST CONTEXT:
        {{mr_context}}

        PATTERN MATCHES:
        {{pattern_matches}}

        RISK ASSESSMENT:
        {{risk_assessment}}

        Compose and post the appropriate comment. Apply labels if the risk level warrants it.
      placeholder: history
    params:
      timeout: 120

# ---------------------------------------------------------------------------
# ROUTERS — Sequential pipeline: match → assess → report
# ---------------------------------------------------------------------------

routers:
  - from: "pattern_matcher"
    to: "risk_assessor"

  - from: "risk_assessor"
    to: "reporter"

  - from: "reporter"
    to: "end"

# ---------------------------------------------------------------------------
# FLOW ENTRY POINT
# ---------------------------------------------------------------------------

flow:
  entry_point: "pattern_matcher"
